<div class="profile-page">


  <!-- PROFILE CONTAINER -->
  <div class="profile-container">
    <div class="profile-header">
      <h2>My Profile</h2>
      <p class="profile-subtitle">Manage your account information</p>
    </div>
    <br>

    <!-- SUCCESS/ERROR MESSAGES -->
    <div *ngIf="successMessage" class="alert alert-success">
      ✓ {{ successMessage }}
    </div>
    <div *ngIf="errorMessage" class="alert alert-error">
      ✗ {{ errorMessage }}
    </div>

    <!-- EDIT BUTTON -->
    <div class="edit-toggle">
      <button
        type="button"
        class="btn-toggle"
        [ngClass]="{ 'active': isEditing }"
        (click)="toggleEdit()">
        {{ isEditing ? '✓ Done Editing' : '✎ Edit Profile' }}
      </button>
    </div>

    <!-- PROFILE FORM -->
    <form (ngSubmit)="updateProfile()" class="profile-form">
      <div class="form-section">
        <h3>Personal Information</h3>

        <div class="input-group">
          <label>Full Name *</label>
          <input
            type="text"
            [(ngModel)]="user.name"
            name="name"
            [attr.readonly]="!isEditing ? '' : null"
            required>
        </div>

        <div class="input-group">
          <label>Email Address *</label>
          <input
            type="email"
            [(ngModel)]="user.email"
            name="email"
            readonly
            disabled>
          <small>Email cannot be changed</small>
        </div>

        <div class="input-group">
          <label>Phone Number</label>
          <input
            type="tel"
            [(ngModel)]="user.phone"
            name="phone"
            [attr.readonly]="!isEditing ? '' : null">
        </div>
      </div>

      <div class="form-section">
        <h3>Business Information</h3>

        <div class="input-group">
          <label>Company Name</label>
          <input
            type="text"
            [(ngModel)]="user.company"
            name="company"
            [attr.readonly]="!isEditing ? '' : null">
        </div>

        <div class="input-group">
          <label>Address</label>
          <textarea
            [(ngModel)]="user.address"
            name="address"
            [attr.readonly]="!isEditing ? '' : null"
            rows="4"></textarea>
        </div>
      </div>

      <div class="form-actions" *ngIf="isEditing">
        <button type="submit" class="btn btn-primary">💾 Save Changes</button>
        <button type="button" class="btn btn-secondary" (click)="toggleEdit()">✕ Cancel</button>
      </div>
    </form>

    <!-- CHANGE PASSWORD -->
    <div class="password-section">
      <div class="edit-toggle" style="margin-top:18px;">
        <button type="button" class="btn-toggle" (click)="toggleChangePassword()">
          {{ isChangingPassword ? '✖ Close Password' : '🔒 Change Password' }}
        </button>
      </div>

      <form *ngIf="isChangingPassword" (ngSubmit)="changePassword()" class="profile-form">
        <div class="form-section">
          <div class="input-group">
            <label>Current Password</label>
            <input type="password" [(ngModel)]="currentPassword" name="currentPassword" required>
          </div>
          <div class="input-group">
            <label>New Password</label>
            <input type="password" [(ngModel)]="newPassword" name="newPassword" required>
          </div>
          <div class="input-group">
            <label>Confirm New Password</label>
            <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Change Password</button>
          <button type="button" class="btn btn-secondary" (click)="toggleChangePassword()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

</div>
